<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon: Network Node / Shield -->
  <g transform="translate(20, 25)">
    <path d="M50 0 L95 25 L95 75 L50 100 L5 75 L5 25 Z" fill="none" stroke="url(#grad1)" stroke-width="4" filter="url(#glow)"/>
    <circle cx="50" cy="50" r="15" fill="#00ffff" opacity="0.8" />
    <circle cx="50" cy="50" r="8" fill="#ffffff" />
    <path d="M50 20 L50 35 M50 65 L50 80 M20 50 L35 50 M65 50 L80 50" stroke="#0080ff" stroke-width="3" />
  </g>
  
  <!-- Text: REX -->
  <text x="130" y="90" font-family="Arial, sans-serif" font-weight="bold" font-size="80" fill="url(#grad1)" filter="url(#glow)">REX</text>
  
  <!-- Text: GATEWAY -->
  <text x="320" y="90" font-family="Arial, sans-serif" font-weight="normal" font-size="40" fill="#ffffff" letter-spacing="2">GATEWAY</text>
  
  <!-- Subline decoration -->
  <rect x="130" y="105" width="340" height="4" fill="url(#grad1)" />
</svg>