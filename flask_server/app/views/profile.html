{% extends "layouts/app.html" %}

{% block content %}
<div class="inner bg-light lter">

    <div class="row">
        <div class="col-lg-12">
            <div class="box">
                <header>
                    <div class="icons"><i class="fa fa-user"></i></div>
                    <h5>Edit Profile</h5>
                </header>

                <div class="body" style="min-height: 60vh;">
                    <form action="{{ url_for('app.edit_user', user_id=user.id) }}" method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" class="form-control" value="{{ user.username }}" disabled>
                            <p class="help-block">Username cannot be changed.</p>
                        </div>

                        <div class="form-group">
                            <label>Role</label>
                            <input type="text" class="form-control" value="{{ user.role }}" disabled>
                            <span class="label label-{{ 'success' if user.role == 'admin' else 'default' }}">{{
                                user.role|upper }}</span>
                        </div>

                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                        </div>

                        <hr>

                        <div class="form-group">
                            <label>New Password (Optional)</label>
                            <input type="password" name="password" class="form-control"
                                placeholder="Leave blank to keep current password">
                            <p class="help-block">Min 6 characters</p>
                        </div>

                        <div class="form-group text-right">
                            <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> Save
                                Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
